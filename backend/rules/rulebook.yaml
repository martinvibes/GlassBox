# GlassBox rulebook — the contract the deterministic risk gate enforces.
# The LLM proposes; THIS file (via gate.py) disposes. Tune values, don't remove keys.
#
# ⚠️ Values are CONSERVATIVE placeholders. Confirm the competition's exact
# max-drawdown %, minimum trade count, and token allowlist on the DoraHacks
# /detail page, then keep our internal ceilings comfortably inside theirs.

version: 1

capital:
  base_currency: USDT          # we measure PnL and rest in this (deepest BSC liquidity)
  starting_equity_usd: 1000.0  # paper/live starting bankroll (set per live window)

drawdown:
  # Tuned for a SMALL live book ($10) with a "never lose ~$1" mandate. The internal
  # ceiling (7%) flattens everything at ≈$0.70 down from the high-water mark — inside
  # the operator's $1 line and far inside the 30% competition DQ cap.
  competition_cap_pct: 30.0    # the DQ line we MUST NOT cross
  internal_ceiling_pct: 7.0    # OUR hard flatten-and-pause trigger (≈$0.70 on a $10 book)
  pause_after_breach_hours: 12 # cool-off before re-deploying after an internal breach

sizing:
  # A FEW small positions, actively rotated. Each entry is small so a stop-out only nicks
  # equity (≈$0.024 on a $1.60 position at the −1.5% stop); most of the book stays in cash.
  max_position_pct: 25.0       # max % of equity in a single token position
  max_gross_exposure_pct: 50.0 # hard ceiling on total deployed across all positions
  max_trade_pct: 16.0          # max % of equity moved in a single trade (one buy = one position)
  min_trade_usd: 1.0           # floor: a trade must clear $1 (below this, fees dominate)
  max_concurrent_positions: 3  # hold up to a FEW names at once (still mostly cash)
  target_position_pct: 16.0    # size each new entry to ~this (≈$1.60 on a $10 book — clears the $1 min)

exits:
  # A TRAILING stop is the real edge: once a position is modestly green we ratchet a
  # stop up behind its peak, so winners lock in profit and a trade "almost never closes
  # red". Losers that never arm the trail get cut at the hard stop. Deterministic,
  # enforced on every open position, every cycle (the LLM never overrides an exit).
  # Calibrated so a banked trade ALWAYS clears the ~0.66% round-trip cost: the locked
  # floor is (arm − trail) = +0.8% gross ≈ +0.14% net on conservative paper fees, and
  # ~+0.6% net live on a V3 pool. No more "green" exits that quietly lose to fees.
  trail_arm_pct: 1.2           # only arm the trail once a trade is genuinely up (+1.2%)
  trail_distance_pct: 0.4      # then exit if it falls 0.4% below its PEAK — winners still RUN
                               # as long as they make new highs; only sold once the run rolls over
  take_profit_pct: 8.0         # extreme-spike backstop only (rare). The trailing stop does the
                               # work below this, so winners are NOT capped at a fixed target
  stop_loss_pct: 1.2           # −1.2% on an un-armed position → tight stop, cut losers FAST
                               # (≈$0.019 on a $1.60 position; essential when buying bounces in a weak tape)
  min_hold_minutes: 0          # no minimum hold; exits may fire the next cycle

conviction_entry:
  min_entry_score: 0.008       # quality bar — lowered so the agent takes real setups more
                               # readily (2–4 trades/day), not just the daily keep-alive

limits:
  max_trades_per_day: 6        # cap fee churn on a small book (cooldown + caps also bound it)
  trade_cooldown_minutes: 5    # min gap between AI BUYs (exits/sells are never cooled down)
  max_slippage_bps: 80         # reject if quoted slippage exceeds this (0.80%)

conviction:
  min_score_to_enter: 0.50     # open on decent setups (looser → more real trades), still gated
  min_score_to_add: 0.65       # higher bar to ADD to an existing position

activity:
  # The competition REQUIRES ≥1 trade/day (7 over the live window) or you're DQ'd for
  # inactivity — confirmed on the DoraHacks rulebook. So we enforce a daily floor. The
  # keep-alive is a TINY, ZERO-RISK swap between two in-scope STABLECOINS (USDT↔USDC):
  # both are on the eligible-token list, so it counts as a qualifying trade, yet we stay
  # fully in stablecoin (honoring "survival > alpha" even on capitulation days, when a
  # volatile probe would correctly be blocked by the risk_off posture). Real opportunity
  # trades already satisfy the floor on active days, so the probe only fires on quiet ones.
  # The floor now PREFERS a small REAL token trade (strongest 7d-uptrend name) so the
  # agent stays genuinely active in the market; it only falls back to the zero-risk
  # USDT↔USDC stablecoin swap in a true downtrend (risk_off / nothing in an uptrend).
  min_trades_total: 7          # over the whole live window
  min_trades_per_day: 3        # target ~3 trades/day (real when possible); max bounded by limits
  activity_trade_max_pct: 1.0  # size of the stablecoin FALLBACK swap only (tiny)

# Regime postures map a perceived market regime → how aggressive we may be.
# The gate clamps proposals to the posture. Only true capitulation (risk_off) fully
# stands the agent down; every other regime deploys, sized by conviction + these caps.
regimes:
  # Room for a few small positions; most of the book still rests in stablecoin.
  risk_off:    { max_gross_exposure_pct: 0.0,  note: "capitulation → stay in stablecoin" }
  neutral:     { max_gross_exposure_pct: 40.0, note: "a few small probes" }
  risk_on:     { max_gross_exposure_pct: 50.0, note: "deploy on conviction" }
  euphoria:    { max_gross_exposure_pct: 35.0, note: "ride strength, fade froth carefully" }

defaults:
  posture: neutral             # unknown regime → trade small (not fully flat)
