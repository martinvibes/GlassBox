<svg width="480" height="480" viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- background -->
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C1226"/>
      <stop offset="1" stop-color="#070A16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.26" r="0.8">
      <stop offset="0" stop-color="#6C5CFF" stop-opacity="0.40"/>
      <stop offset="0.55" stop-color="#6C5CFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#6C5CFF" stop-opacity="0"/>
    </radialGradient>
    <!-- glass face fills -->
    <linearGradient id="front" x1="150" y1="190" x2="330" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#AFC0FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="top" x1="150" y1="120" x2="390" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#AFC0FF" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="side" x1="330" y1="130" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B4ACF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3A2E8F" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="sheen" x1="150" y1="190" x2="300" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="up" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4DEFB0"/>
      <stop offset="1" stop-color="#23C98C"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="480" height="480" rx="104" fill="url(#bg)"/>
  <rect width="480" height="480" rx="104" fill="url(#glow)"/>

  <!-- soft glow behind the cube -->
  <g opacity="0.55" filter="url(#soft)">
    <path d="M150 190 L330 190 L390 130 L210 130 Z" fill="#6C5CFF"/>
    <rect x="150" y="190" width="180" height="182" rx="14" fill="#6C5CFF"/>
  </g>

  <!-- GLASS CUBE -->
  <!-- top face -->
  <path d="M150 190 L210 130 L390 130 L330 190 Z" fill="url(#top)" stroke="#CBD6FF" stroke-opacity="0.55" stroke-width="3" stroke-linejoin="round"/>
  <!-- right face -->
  <path d="M330 190 L390 130 L390 312 L330 372 Z" fill="url(#side)" stroke="#9FB0FF" stroke-opacity="0.45" stroke-width="3" stroke-linejoin="round"/>
  <!-- front face -->
  <rect x="150" y="190" width="180" height="182" rx="14" fill="url(#front)" stroke="#DCE5FF" stroke-opacity="0.7" stroke-width="3.5"/>

  <!-- candlesticks (the trades you can see through the glass) -->
  <g stroke-linecap="round">
    <!-- candle 1 (red dip) -->
    <line x1="186" y1="288" x2="186" y2="344" stroke="#FF6B81" stroke-width="3"/>
    <rect x="178" y="306" width="16" height="28" rx="3" fill="#FF6B81"/>
    <!-- candle 2 (green) -->
    <line x1="222" y1="252" x2="222" y2="330" stroke="url(#up)" stroke-width="3"/>
    <rect x="214" y="272" width="16" height="44" rx="3" fill="url(#up)"/>
    <!-- candle 3 (green, higher) -->
    <line x1="258" y1="224" x2="258" y2="312" stroke="url(#up)" stroke-width="3"/>
    <rect x="250" y="240" width="16" height="56" rx="3" fill="url(#up)"/>
    <!-- candle 4 (green, highest) -->
    <line x1="294" y1="206" x2="294" y2="300" stroke="url(#up)" stroke-width="3"/>
    <rect x="286" y="222" width="16" height="60" rx="3" fill="url(#up)"/>
  </g>

  <!-- uptrend arrow line through the highs -->
  <path d="M178 320 L214 286 L250 256 L292 232" fill="none" stroke="#EAF5FF" stroke-opacity="0.85" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M292 232 l-16 2 l8 14 z" fill="#EAF5FF" fill-opacity="0.9"/>

  <!-- diagonal glass sheen on the front face -->
  <path d="M150 190 h180 v182 h-180 z" fill="url(#sheen)" opacity="0.9"/>
  <path d="M168 196 L150 226 L150 196 Z" fill="#FFFFFF" opacity="0.18"/>
</svg>
